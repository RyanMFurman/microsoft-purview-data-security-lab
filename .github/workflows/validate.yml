name: Validate local lab

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run scenario-level analyzer
        run: python .\automation\Analyze-SensitiveData.py

      - name: Run Python unit tests
        run: python -m unittest discover -s .\automation\tests -v

      - name: Validate correct PowerShell sample
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\automation\Test-PurviewConfiguration.ps1

      - name: Prove invalid PowerShell sample returns exit code 2
        shell: powershell
        run: |
          & powershell -NoProfile -ExecutionPolicy Bypass `
              -File .\automation\Test-PurviewConfiguration.ps1 `
              -ConfigurationPath .\automation\samples\purview-configuration.invalid.sample.json
          $validatorExit = $LASTEXITCODE
          if ($validatorExit -ne 2) {
              throw "Expected validator exit code 2; observed $validatorExit."
          }
          Write-Host "Invalid sample correctly returned exit code 2."
          exit 0
